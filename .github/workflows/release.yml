name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Raw binaries (amd64 + arm64) ─────────────────────────────────────────
  binary:
    name: Build binary linux/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install ALSA dev headers
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Build
        run: go build -ldflags="-s -w" -o tidalt-linux-${{ matrix.goarch }} ./cmd/tidalt

      - uses: actions/upload-artifact@v4
        with:
          name: tidalt-linux-${{ matrix.goarch }}
          path: tidalt-linux-${{ matrix.goarch }}

  # ── Arch Linux package ────────────────────────────────────────────────────
  arch:
    name: Build Arch package
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install build tools
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel go alsa-lib git sudo

      # makepkg refuses to run as root; create an unprivileged build user.
      - name: Create build user
        run: |
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers

      - uses: actions/checkout@v4

      - name: Set pkgver from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" packaging/arch/PKGBUILD

      - name: Copy PKGBUILD into build home
        run: |
          cp packaging/arch/PKGBUILD /home/builder/PKGBUILD
          chown builder /home/builder/PKGBUILD

      - name: Build package
        run: sudo -u builder bash -c 'cd /home/builder && makepkg --noconfirm --syncdeps'

      - uses: actions/upload-artifact@v4
        with:
          name: arch-pkg
          path: /home/builder/*.pkg.tar.zst

  # ── Debian package ────────────────────────────────────────────────────────
  debian:
    name: Build Debian package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ALSA dev headers and debhelper
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper libasound2-dev

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        run: |
          CGO_ENABLED=1 go build \
            -trimpath \
            -buildmode=pie \
            -ldflags "-s -w -linkmode=external" \
            -o tidalt-linux-amd64 \
            ./cmd/tidalt

      - name: Set version in changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "1s/.*/tidalt (${VERSION}-1) unstable; urgency=medium/" \
            packaging/debian/changelog

      - name: Copy debian/ into place
        run: cp -r packaging/debian debian

      - name: Build .deb
        run: dpkg-buildpackage -us -uc -b

      - uses: actions/upload-artifact@v4
        with:
          name: debian-pkg
          path: ../*.deb

  # ── GitHub Release ────────────────────────────────────────────────────────
  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [binary, arch, debian]

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Build release body
        id: body
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fetch the auto-generated changelog from the GitHub API.
          CHANGELOG=$(gh api repos/${{ github.repository }}/releases/generate-notes \
            --method POST \
            --field tag_name=${{ github.ref_name }} \
            --jq '.body')

          # Write the checksum section, then append the generated changelog.
          printf '%s\n' '## Checksums (SHA-256)' > release_body.md
          printf '%s\n' '' >> release_body.md
          printf '%s\n' 'Verify all downloaded files at once:' >> release_body.md
          printf '%s\n' '' >> release_body.md
          printf '%s\n' '```bash' >> release_body.md
          printf '%s\n' 'sha256sum -c checksums.txt' >> release_body.md
          printf '%s\n' '```' >> release_body.md
          printf '%s\n' '' >> release_body.md
          printf '%s\n' 'Or check a single file:' >> release_body.md
          printf '%s\n' '' >> release_body.md
          printf '%s\n' '```bash' >> release_body.md
          printf '%s\n' 'sha256sum --ignore-missing -c checksums.txt' >> release_body.md
          printf '%s\n' '```' >> release_body.md
          printf '%s\n' '' >> release_body.md
          printf '%s\n' '```' >> release_body.md
          cat dist/checksums.txt >> release_body.md
          printf '%s\n' '```' >> release_body.md
          printf '%s\n' '' >> release_body.md
          printf '%s\n' '---' >> release_body.md
          printf '%s\n' '' >> release_body.md
          printf '%s' "$CHANGELOG" >> release_body.md

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: release_body.md
