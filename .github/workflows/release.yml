name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Raw binaries (amd64 + arm64) ─────────────────────────────────────────
  binary:
    name: Build binary linux/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install ALSA dev headers
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Build
        run: go build -ldflags="-s -w" -o tidalt-linux-${{ matrix.goarch }} ./cmd/tidalt

      - uses: actions/upload-artifact@v4
        with:
          name: tidalt-linux-${{ matrix.goarch }}
          path: tidalt-linux-${{ matrix.goarch }}

  # ── Docker image (benehiko/tidalt) ───────────────────────────────────────
  docker:
    name: Push Docker image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: benehiko
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DOCKER_TAG="${GITHUB_REF_NAME}" docker buildx bake docker \
            --file docker-bake.hcl \
            --set "*.args.VERSION=${VERSION}" \
            --push

  # ── Distro packages via docker bake ──────────────────────────────────────
  packages:
    name: Build distro packages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: benehiko
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          docker buildx bake \
            --file docker-bake.hcl \
            --set "*.args.VERSION=${VERSION}" \
            --set "*.output=type=local,dest=dist"

      - name: Flatten platform subdirectories
        run: find dist -mindepth 2 -type f -exec mv {} dist/ \; && find dist -type d -empty -delete

      - uses: actions/upload-artifact@v4
        with:
          name: distro-packages
          path: dist/

  # ── GitHub Release ────────────────────────────────────────────────────────
  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [binary, packages, docker]

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Build release body
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CHANGELOG=$(gh api repos/${{ github.repository }}/releases/generate-notes \
            --method POST \
            --field tag_name=${{ github.ref_name }} \
            --jq '.body')

          printf '%s\n' '## Checksums (SHA-256)' > release_body.md
          printf '%s\n' '' >> release_body.md
          printf '%s\n' 'Verify all downloaded files at once:' >> release_body.md
          printf '%s\n' '' >> release_body.md
          printf '%s\n' '```bash' >> release_body.md
          printf '%s\n' 'sha256sum -c checksums.txt' >> release_body.md
          printf '%s\n' '```' >> release_body.md
          printf '%s\n' '' >> release_body.md
          printf '%s\n' 'Or check a single file:' >> release_body.md
          printf '%s\n' '' >> release_body.md
          printf '%s\n' '```bash' >> release_body.md
          printf '%s\n' 'sha256sum --ignore-missing -c checksums.txt' >> release_body.md
          printf '%s\n' '```' >> release_body.md
          printf '%s\n' '' >> release_body.md
          printf '%s\n' '```' >> release_body.md
          cat dist/checksums.txt >> release_body.md
          printf '%s\n' '```' >> release_body.md
          printf '%s\n' '' >> release_body.md
          printf '%s\n' '---' >> release_body.md
          printf '%s\n' '' >> release_body.md
          printf '%s' "$CHANGELOG" >> release_body.md

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: release_body.md
