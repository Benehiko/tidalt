name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build linux/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install ALSA dev headers
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Build
        run: go build -ldflags="-s -w" -o tidalt-linux-${{ matrix.goarch }} ./cmd/tidalt

      - uses: actions/upload-artifact@v4
        with:
          name: tidalt-linux-${{ matrix.goarch }}
          path: tidalt-linux-${{ matrix.goarch }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: tidalt-linux-*
          generate_release_notes: true
